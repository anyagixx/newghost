name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Lint guard: exhaustive enum matching"
        run: |
          if grep -R 'allow.*wildcard_enum_match_arm' src/; then
            echo "BLOCKED: wildcard_enum_match_arm must stay denied"
            exit 1
          fi

      - name: "Cargo clippy"
        run: cargo clippy --all-targets --all-features

      - name: "SOCKS5 verification"
        run: cargo test socks5
